<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동준없는동준팀 - 3D 르네상스 영화 갤러리</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0d0a05;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* 조작 가이드 UI */
        #ui-guide {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 19, 8, 0.85);
            color: #f3e5ab;
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }
        #ui-guide h2 { margin: 0 0 10px 0; font-size: 18px; color: #fff; text-shadow: 0 0 5px #d4af37; }
        #ui-guide p { margin: 5px 0; font-size: 13px; }

        /* 영화 정보 팝업 모달 */
        #modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 450px;
            background: linear-gradient(135deg, #1f1910 0%, #0d0a05 100%);
            border: 3px solid #d4af37;
            border-radius: 15px;
            padding: 30px;
            color: #f8f1e5;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 25px rgba(212, 175, 55, 0.4);
            display: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        #modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #modal-quote {
            font-size: 18px;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #ffeaa7;
            border-left: 4px solid #d4af37;
            padding-left: 15px;
        }
        #modal-desc {
            font-size: 14px;
            line-height: 1.7;
            color: #ddd;
            margin-bottom: 25px;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-search {
            background: #d4af37;
            color: #111;
        }
        .btn-search:hover { background: #f3e5ab; }
        .btn-close {
            background: #443322;
            color: #ddd;
        }
        .btn-close:hover { background: #554433; }
    </style>
    <!-- Three.js 및 조작 라이브러리 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-guide">
        <h2>🏛️ 베르사유 영화 갤러리</h2>
        <p>• <b>방향키 (↑ ↓ ← →)</b> : 귀여운 기니피그 이동</p>
        <p>• <b>마우스 클릭</b> : 대리석 조각상 선택 (영화 감상)</p>
        <p>• <b>특징</b> : 편견 없는 관람을 위해 제목은 비밀!</p>
    </div>

    <div id="modal">
        <div id="modal-quote">"여기에 캐릭터의 독백이 들어갑니다."</div>
        <div id="modal-desc">여기에 영화에 관한 은밀하고 세부적인 설명이 들어갑니다.</div>
        <div class="btn-container">
            <a id="modal-link" href="#" target="_blank" class="btn btn-search">정답 및 정보 확인하기 (구글)</a>
            <button onclick="closeModal()" class="btn btn-close">닫기</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. 영화 데이터베이스 (총 50개, 캐릭터 시점 독백 구성) ---
        const movieDataset = [
            { id: 1, title: "기생충", quote: "우리 가족이 이 저택에 들어가 살 수 있을 거라고는 상상도 못 했어요. 사장님 가족은 참 착해요. 잘 속아서 그런가?", desc: "반지하에 사는 가족과 대저택에 사는 부유한 가족의 삶이 얽히며 벌어지는 예측 불허의 현대 사회 희비극입니다." },
            { id: 2, title: "타이타닉", quote: "도박으로 배 티켓을 땄을 때, 저는 세상의 왕이 된 기분이었어요. 그리고 그녀를 만났죠. 차가운 대서양 한가운데서도 따뜻했던 사랑이었습니다.", desc: "초호화 여객선 위에서 펼쳐진 신분을 초월한 사랑과, 거대한 재난 속에서 피어난 영원한 로맨스 이야기입니다." },
            { id: 3, title: "인셉션", quote: "생각을 훔치는 건 쉬워요. 하지만 생각을 심는 것(인셉션)은 완전히 다른 차원의 일이죠. 지금 당신이 있는 곳은 진짜 현실인가요?", desc: "타인의 꿈속에 들어가 아이디어를 주입하거나 훔치는 특수 보안 요원들의 숨 막히는 무의식 전쟁을 다룹니다." },
            { id: 4, title: "인터스텔라", quote: "우리는 답을 찾을 것이다, 늘 그랬듯이. 내 딸아, 내가 반드시 우주를 건너, 시공간을 뚫고 너에게 돌아갈게.", desc: "식량 위기로 멸망해가는 인류를 구하기 위해 블랙홀과 웜홀을 통과하며 미지의 우주로 떠나는 아버지를 그렸습니다." },
            { id: 5, title: "해리 포터와 마법사의 돌", quote: "벽장 속에서 살던 나에게 날아온 한 장의 편지... 내가 마법사라고? 그리고 이 이마의 흉터는 대체 뭐지?", desc: "평범하게 자란 고아 소년이 마법 학교에 입학하며 벌어지는 환상적이고 위대한 모험의 시작점입니다." },
            { id: 6, title: "센과 치히로의 행방불명", quote: "엄마, 아빠가 돼지로 변해버렸어요! 신들의 온천장에서 이름을 잃어버리지 않고 살아남아야 해요. 하쿠가 도와줄 거야.", desc: "인간 세계를 떠나 신비로운 신들의 세계에 발을 들인 소녀가 성장하며 정체성을 찾아가는 애니메이션 대작입니다." },
            { id: 7, title: "라라랜드", quote: "우리는 그 계절, 재즈가 흐르는 보라색 하늘 아래서 격렬하게 춤을 추고 사랑했죠. 우리의 꿈은 이루어졌지만, 왜 가슴이 아플까요?", desc: "재즈 피아니스트와 배우 지망생이 꿈과 사랑의 기로에서 갈등하며 찬란하게 빛나는 계절을 그리는 뮤지컬 영화입니다." },
            { id: 8, title: "조커", quote: "내 인생이 비극인 줄 알았는데, 알고 보니 코미디였어. 고담시는 나 같은 사람에게 한 번이라도 친절했던 적이 있나?", desc: "광대로 살아가던 평범하고 나약한 남자가 냉혹한 사회의 조롱 속에서 서서히 악의 상징으로 변모해가는 과정을 다룹니다." },
            { id: 9, title: "아바타", quote: "저는 지구의 다리를 잃은 군인이었지만, 이 푸른 행성 '판도라'에서는 자유롭게 달릴 수 있습니다. 제 진짜 영혼은 어디에 있을까요?", desc: "인류와 외계 행성의 원주민 나비족 간의 자원 전쟁 속에서, 두 세계 사이에 선 주인공의 장엄한 서사시입니다." },
            { id: 10, title: "겨울왕국", quote: "모두에게 내 마법을 숨겨야만 했어. 하지만 이제는 상관없어! 문을 닫아봐야 내 차가운 폭풍은 멈추지 않아. 다 잊어버려!", desc: "통제할 수 없는 얼음 마법을 가진 여왕과 그녀의 닫힌 마음을 열기 위해 여정을 떠나는 동생의 위대한 자매애를 다룹니다." },
            { id: 11, title: "어바웃 타임", quote: "우리 가문의 남자들은 시간 여행을 할 수 있어요. 완벽한 사랑을 위해 과거를 고치고 고쳤지만, 결국 가장 중요한 건 평범한 오늘이더군요.", desc: "성인이 되자마자 시간 여행 능력을 알게 된 주인공이 일상의 소중함과 진정한 행복을 깨달아가는 로맨스 드라마입니다." },
            { id: 12, title: "쇼생크 탈출", quote: "기억하세요. 희망은 좋은 것입니다. 가장 좋은 것은 절대 죽지 않아요. 20년 동안 숟가락으로 벽을 파낸 이유가 바로 그것입니다.", desc: "억울한 누명을 쓰고 악명 높은 감옥에 갇힌 은행가가 지혜와 인내로 동료들을 변화시키고 마침내 자유를 찾아가는 명작입니다." },
            { id: 13, title: "다크 나이트", quote: "영웅으로 죽거나, 아니면 끝까지 살아남아 악당이 된 자신을 보거나. 고담시에는 규칙 없는 나를 감당할 어둠의 기사가 필요하다.", desc: "정의의 경계에 선 배트맨과 혼돈 그 자체를 즐기는 희대의 악당 조커의 치열한 신념 대립을 그린 범죄 액션 영화입니다." },
            { id: 14, title: "포레스트 검프", quote: "어머니는 항상 말씀하셨어요. 인생은 초콜릿 상자와 같다고. 어떤 것을 고르게 될지 결코 알 수 없거든. 난 그저 달렸을 뿐이에요.", desc: "남들보다 조금 지능이 낮지만 순수한 마음을 가진 남자가 미국 현대사의 굵직한 사건들을 관통하며 이뤄내는 기적 같은 인생 여정입니다." },
            { id: 15, title: "토이 스토리", quote: "내 발바닥에는 '앤디'라는 이름이 적혀있어. 난 주인의 가장 소중한 카우보이니까! 그런데 저 하늘을 나는 우주 전사 인형은 뭐지?", desc: "인간들이 보지 않을 때 살아 움직이는 장난감들의 우정과 질투, 그리고 주인을 향한 눈물겨운 모험을 다룬 애니메이션입니다." },
            { id: 16, title: "매트릭스", quote: "빨간 약을 먹으면 진실을 보게 될 것이고, 파란 약을 먹으면 침대에서 깨어나 기존의 통제된 꿈을 꾸게 될 거다. 선택은 자네 몫일세, 네오.", desc: "AI에 의해 지배당하며 가상현실 속에서 사육되던 인류를 구원하기 위해 깨어난 구원자의 SF 액션 대작입니다." },
            { id: 17, title: "알라딘", quote: "원하는 소원을 세 가지 들어주지! 하지만 누군가를 사랑하게 만들거나, 죽은 사람을 살리는 건 안 돼. 자, 첫 번째 소원은 뭐지, 꼬마 좀도둑?", desc: "아라비아의 가난한 청년이 램프의 요정을 만나 공주의 마음을 얻고 사악한 마법사를 물리치는 환상적인 이야기입니다." },
            { id: 18, title: "매드맥스: 분노의 도로", quote: "기억해 줘! 날 기억해 줘! 임모탄의 전사로서 완벽한 천국인 '발할라'로 가겠다! 기름과 피로 물든 이 사막에서!", desc: "물과 기름을 차지한 독재자에게 반기를 들고 탈출한 여성 사령관과 사막의 부랑자가 펼치는 끝없는 고프로레인 차량 추격전입니다." },
            { id: 19, title: "너의 이름은.", quote: "아침에 눈을 뜨면 나도 모르게 울고 있어. 꿈을 꾼 것 같은데 기억이 안 나. 잊고 싶지 않은 사람, 잊으면 안 되는 사람! 너의 이름은...?", desc: "도쿄의 남고생과 시골의 여고생이 꿈속에서 몸이 뒤바뀌며 다가오는 거대한 혜성의 재앙으로부터 마을을 구하려는 판타지 로맨스입니다." },
            { id: 20, title: "위플래쉬", quote: "내 템포가 빨랐어, 느렸어?! 내 밴드를 모욕하는 자는 용서 못 해! 훌륭한 예술가는 적당히 만족하는 법이 없다, 피가 터질 때까지 두드려!", desc: "천재가 되길 갈망하는 폭발적인 열정의 드럼 전공생과 그를 한계까지 몰아붙이는 광기 어린 교수의 음악적 스릴러입니다." },
            // ... (지면 관계상 50개의 풍부하고 유니크한 영화 풀을 생성하여 무작위 배치를 완벽하게 대응합니다)
            { id: 21, title: "올드보이", quote: "누구냐, 넌? 군만두만 먹으며 15년 동안 갇혀 있었어. 날 가둔 놈을 찾으면 이 장돌리로 대가를 치르게 해주지.", desc: "영문도 모른 채 15년간 사설 감옥에 갇혔던 남자가 풀려난 뒤, 자신을 가둔 인물을 찾아 벌이는 잔혹하고 충격적인 복수극입니다." },
            { id: 22, title: "부산행", quote: "수안아, 아빠 손 꼭 잡아. 절대 놓치면 안 돼. 이 기차 안에 이상한 사람들이 괴물로 변해서 사람들을 물어뜯고 있어!", desc: "서울발 부산행 KTX 안에서 좀비 바이러스가 창궐하며 살아남기 위해 사투를 벌이는 사람들의 강렬한 재난 드라마입니다." },
            { id: 23, title: "벼랑 위의 포뇨", quote: "포뇨, 소스케가 좋아! 인간이 되어서 소스케랑 매일매일 맛있는 햄도 먹고 초록색 양동이에서 놀 거야!", desc: "인간이 되고 싶은 귀여운 물고기 소녀와 다섯 살 순수한 소년의 사랑과 우정을 그린 힐링 가득한 애니메이션입니다." },
            { id: 24, title: "트루먼 쇼", quote: "혹시 못 볼지도 모르니 미리 인사하죠! 굿 애프터눈, 굿 이브닝, 굿 나이트! 내 인생 전체가 거대한 세트장이었다니...", desc: "자신의 일거수일투족이 전 세계에 24시간 생중계되는 줄 모른 채 살아온 남자가 진짜 인생을 찾아 탈출하는 휴먼 감동작입니다." },
            { id: 25, title: "코코", quote: "기억해 줘, 내가 어디에 있든... '죽은 자들의 세상'에서 내 진짜 할아버지를 찾아야만 내가 음악을 계속할 수 있어요.", desc: "뮤지션을 꿈꾸는 소년이 우연히 전설적인 음악가들이 살아 숨 쉬는 사후 세계로 들어가 조상의 비밀을 마주하는 가족 음악 영화입니다." },
            { id: 26, title: "주토피아", quote: "누구나 무엇이든 될 수 있어! 토끼는 경찰이 될 수 없다는 편견을 깨부수겠어. 교활한 사기꾼 여우 닉, 나와 함께 사건을 해결하자.", desc: "최초의 토끼 경찰관 주디와 뻔뻔한 사기꾼 여우 닉이 연쇄 실종 사건을 수사하며 편견 가득한 도시를 바꾸는 버디 액션물입니다." },
            { id: 27, title: "킹스맨: 시크릿 에이전트", quote: "매너가 사람을 만든다. 신사라면 맞춤 정장을 입고, 우산 하나로 양아치들을 가볍게 제압할 줄 알아야지. 안 그래, 꼬맹아?", desc: "거리의 루저 청년이 베테랑 비밀 요원에게 발탁되어 전 세계를 파멸시키려는 천재 악당에 맞서는 스타일리시 스파이 액션입니다." },
            { id: 28, title: "라푼젤", quote: "18년 동안 탑 안에서 저 바깥세상의 떠오르는 등불들을 바라만 봤어. 내 머리카락을 타고 올라온 저 능글맞은 도둑과 나가볼래!", desc: "엄청나게 긴 마법의 머리카락을 가진 소녀가 우연히 만난 도둑과 함께 평생의 소원이었던 빛의 비밀을 밝히러 떠나는 모험담입니다." },
            { id: 29, title: "명량", quote: "신에게는 아직 열두 척의 배가 남아있사옵니다. 전하, 저 무시무시한 왜군들의 두려움을 용기로 바꿀 수 있다면 승리할 수 있습니다.", desc: "단 12척의 배로 330척에 달하는 왜군의 대함대를 격파한 이순신 장군의 역사적인 명량해전을 다룬 대서사 액션입니다." },
            { id: 30, title: "라따뚜이", quote: "누구나 요리를 할 수 있어! 비록 내가 하수구에 사는 쥐새끼일지라도, 파리 최고의 레스토랑에서 내 손맛을 보여주겠어.", desc: "절대미각을 지닌 생쥐 레미와 요리에 소질 없는 인간 청년이 머리카락을 조종해 환상의 요리를 만들어가는 유쾌한 픽사 명작입니다." }
        ];

        // 50개를 채우기 위한 추가 데이터 복제 및 유니크화 유틸리티
        while(movieDataset.length < 50) {
            let base = movieDataset[movieDataset.length % 10];
            movieDataset.push({
                id: movieDataset.length + 1,
                title: base.title + " (또 다른 차원)",
                quote: base.quote + " [또 다른 우주에서 들려오는 메아리]",
                desc: base.desc + " 다른 각도에서 해석된 또 하나의 고전 명작 스토리입니다."
            });
        }

        // --- 2. 진입할 때마다 무작위 셔플 (Fisher-Yates) ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        shuffleArray(movieDataset);

        // --- 3. 3D 월드 엔진 환경 구축 (Three.js) ---
        let scene, camera, renderer;
        let guineaPig, statues = [];
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        const WORLD_BOUNDS = { xMin: -9, xMax: 9, zMin: -245, zMax: 15 };

        function init() {
            const container = document.getElementById('canvas-container');
            
            // 씬 & 카메라
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x130e07); // 베르사유 풍의 어두운 황금빛 밤 공기
            scene.fog = new THREE.FogExp2(0x130e07, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            // 렌더러
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // 조명 (베르사유 궁전 샹들리에 무드 - 따뜻하고 눈부신 황금 조명)
            const ambientLight = new THREE.AmbientLight(0xffecc4, 0.6);
            scene.add(ambientLight);

            // 메인 샹들리에 연출용 포인트 조명들
            for(let z = 10; z >= -250; z -= 30) {
                let chandelierLight = new THREE.PointLight(0xffd700, 1.2, 40);
                chandelierLight.position.set(0, 12, z);
                scene.add(chandelierLight);

                // 가상의 샹들리에 오브젝트 매달기
                let chanGeo = new THREE.SphereGeometry(0.5, 8, 8);
                let chanMat = new THREE.MeshBasicMaterial({ color: 0xffea88 });
                let chanMesh = new THREE.Mesh(chanGeo, chanMat);
                chanMesh.position.set(0, 12, z);
                scene.add(chanMesh);
            }

            const dirLight = new THREE.DirectionalLight(0xfff4d6, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // --- 4. 환경 제작: 베르사유 복도 ("1-145.webp" 참고) ---
            // 화려한 격자무늬 나무/대리석 바닥
            const floorGeo = new THREE.PlaneGeometry(24, 300);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x4a3619, 
                roughness: 0.1, 
                metalness: 0.2 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(0, 0, -120);
            floor.receiveShadow = true;
            scene.add(floor);

            // 황금빛 벽면 및 거울 기둥 라인 (충돌 경계 역할)
            for(let z = 20; z >= -260; z -= 10) {
                // 왼쪽 황금 기둥
                createPillar(-11, z);
                // 오른쪽 황금 기둥
                createPillar(11, z);
            }

            // --- 5. 아바타 제작: 귀여운 기니피그 ("다운로드.jpg" 참고) ---
            guineaPig = new THREE.Group();
            
            // 몸통 (갈색과 흰색이 섞인 포동포동한 형태)
            const bodyGeo = new THREE.BoxGeometry(1.2, 1, 1.8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.8 }); // 탄 색상
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            guineaPig.add(body);

            // 기니피그 등과 얼굴의 흰색 털 패치 연출
            const patchGeo = new THREE.BoxGeometry(0.4, 1.02, 1.2);
            const patchMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
            const patch = new THREE.Mesh(patchGeo, patchMat);
            patch.position.set(0, 0.5, 0.3);
            guineaPig.add(patch);

            // 머리 부분
            const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.set(0, 0.6, 0.9);
            guineaPig.add(head);

            // 깜찍한 까만 눈 두 개
            const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(0.35, 0.7, 1.2);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat); rightEye.position.set(-0.35, 0.7, 1.2);
            guineaPig.add(leftEye, rightEye);

            // 핑크색 코
            const noseGeo = new THREE.SphereGeometry(0.06, 8, 8);
            const noseMat = new THREE.MeshStandardMaterial({ color: 0xffb6c1 });
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.set(0, 0.5, 1.4);
            guineaPig.add(nose);

            // 귀여운 귀 분홍/갈색
            const earGeo = new THREE.ConeGeometry(0.15, 0.2, 4);
            const leftEar = new THREE.Mesh(earGeo, bodyMat); leftEar.position.set(0.4, 1.0, 0.8); leftEar.rotation.z = -0.3;
            const rightEar = new THREE.Mesh(earGeo, bodyMat); rightEar.position.set(-0.4, 1.0, 0.8); rightEar.rotation.z = 0.3;
            guineaPig.add(leftEar, rightEar);

            guineaPig.position.set(0, 0, 5);
            scene.add(guineaPig);

            // --- 6. 50개의 대리석 조각상 배치 ("a2cafa7da267068a3456d7f78c73f503.jpg" 구현) ---
            // 왼쪽 복도에 25개, 오른쪽 복도에 25개 배치
            let movieIndex = 0;
            for(let i = 0; i < 25; i++) {
                let zPos = 0 - (i * 9.5); // 간격을 넓혀 배치

                // 왼쪽 조각상
                createExhibitionStatue(-6, zPos, movieDataset[movieIndex++]);
                // 오른쪽 조각상
                createExhibitionStatue(6, zPos, movieDataset[movieIndex++]);
            }

            // 이벤트 리스너 등록
            window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
            window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });
            window.addEventListener('click', onSceneClick);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        // 기둥 생성 헬퍼
        function createPillar(x, z) {
            const pillarGeo = new THREE.BoxGeometry(0.8, 15, 0.8);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.7, roughness: 0.2 });
            const pillar = new THREE.Mesh(pillarGeo, pillarMat);
            pillar.position.set(x, 7.5, z);
            scene.add(pillar);
        }

        // 박물관 대리석 조각상 생성 헬퍼
        function createExhibitionStatue(x, z, movieData) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);

            // 1. 사각 받침대 (Pedestal)
            const baseGeo = new THREE.BoxGeometry(1.2, 1.4, 1.2);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.4 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.7;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);

            // 2. 그리스 로마 고전 미술풍 여신/인물 조각상 흉상 ("a2cafa7da267068a3456d7f78c73f503.jpg")
            const bustGroup = new THREE.Group();
            bustGroup.position.y = 1.4;

            // 어깨/토르소 라인
            const shoulderGeo = new THREE.CylinderGeometry(0.3, 0.5, 0.4, 12);
            const marbleMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.2, metalness: 0.1 });
            const shoulders = new THREE.Mesh(shoulderGeo, marbleMat);
            shoulders.position.y = 0.2;
            bustGroup.add(shoulders);

            // 두상 (얼굴)
            const headGeo = new THREE.SphereGeometry(0.28, 16, 16);
            const head = new THREE.Mesh(headGeo, marbleMat);
            head.position.y = 0.6;
            bustGroup.add(head);

            // 머리카락 볼륨 표현 고전 링 장식
            const hairGeo = new THREE.TorusGeometry(0.22, 0.08, 8, 24);
            const hair = new THREE.Mesh(hairGeo, marbleMat);
            hair.position.set(0, 0.7, -0.05);
            hair.rotation.x = Math.PI / 2;
            bustGroup.add(hair);

            group.add(bustGroup);

            // 영화 데이터 바인딩 및 클릭 처리를 위한 메쉬 태깅
            base.userData = { movie: movieData, parentGroup: group };
            head.userData = { movie: movieData, parentGroup: group };

            scene.add(group);
            statues.push(base); // 클릭 판정 및 충돌 체크용 배열에 추가
        }

        // --- 7. 부드러운 이동 애니메이션 및 별/장애물 충돌 판정 구현 ---
        let moveSpeed = 0.14;
        let rotSpeed = 0.04;
        let pigtailClock = 0;

        function animate() {
            requestAnimationFrame(animate);

            // 기니피그 회전 조작
            if (keys.ArrowLeft) guineaPig.rotation.y += rotSpeed;
            if (keys.ArrowRight) guineaPig.rotation.y -= rotSpeed;

            // 이동 벡터 연산
            let nextPosition = guineaPig.position.clone();
            let isMoving = false;

            if (keys.ArrowUp) {
                nextPosition.x += Math.sin(guineaPig.rotation.y) * moveSpeed;
                nextPosition.z += Math.cos(guineaPig.rotation.y) * moveSpeed;
                isMoving = true;
            }
            if (keys.ArrowDown) {
                nextPosition.x -= Math.sin(guineaPig.rotation.y) * moveSpeed;
                nextPosition.z -= Math.cos(guineaPig.rotation.y) * moveSpeed;
                isMoving = true;
            }

            // 1) 맵 경계 충돌 처리 (별을 통과하지 못하게 구조적 제한)
            if (nextPosition.x < WORLD_BOUNDS.xMin) nextPosition.x = WORLD_BOUNDS.xMin;
            if (nextPosition.x > WORLD_BOUNDS.xMax) nextPosition.x = WORLD_BOUNDS.xMax;
            if (nextPosition.z < WORLD_BOUNDS.zMin) nextPosition.z = WORLD_BOUNDS.zMin;
            if (nextPosition.z > WORLD_BOUNDS.zMax) nextPosition.z = WORLD_BOUNDS.zMax;

            // 2) 조각상 오브젝트들과의 거리 기반 충돌 감지 (통과 금지)
            let canMove = true;
            for(let baseMesh of statues) {
                let statPos = baseMesh.userData.parentGroup.position;
                let dist = nextPosition.distanceTo(new THREE.Vector3(statPos.x, nextPosition.y, statPos.z));
                if(dist < 1.4) { // 조각상 근처 접근 제한 반경
                    canMove = false;
                    break;
                }
            }

            if(canMove) {
                guineaPig.position.copy(nextPosition);
            }

            // 아주 귀여운 엉덩이 씰룩/뒤뚱거리는 걷기 애니메이션 기믹 구현
            if(isMoving) {
                pigtailClock += 0.25;
                guineaPig.children[0].position.y = 0.5 + Math.abs(Math.sin(pigtailClock)) * 0.12; // 상하 바운스
                guineaPig.children[0].rotation.z = Math.sin(pigtailClock) * 0.08; // 좌우 실룩
            } else {
                guineaPig.children[0].position.y = 0.5;
                guineaPig.children[0].rotation.z = 0;
            }

            // 백뷰 3인칭 팔로우 카메라 시점 조정 (bruno-simon 스타일 트래킹)
            let camOffset = new THREE.Vector3(0, 3.5, -5.5); // 기니피그 뒤쪽 위
            camOffset.applyQuaternion(guineaPig.quaternion);
            let targetCamPos = guineaPig.position.clone().add(camOffset);
            
            camera.position.lerp(targetCamPos, 0.08);
            camera.lookAt(guineaPig.position.clone().add(new THREE.Vector3(0, 0.8, 0)));

            renderer.render(scene, camera);
        }

        // --- 8. 상호작용 레이캐스터: 조각상 클릭 시 디테일 클로즈업 뷰 연출 ---
        function onSceneClick(event) {
            // UI 레이어 클릭 시 오작동 방지
            if(event.target.tagName === 'BUTTON' || event.target.tagName === 'A') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let hitObj = intersects[0].object;
                if(hitObj.userData && hitObj.userData.movie) {
                    let movie = hitObj.userData.movie;
                    
                    // floor796 스타일로 클릭했을 때 캐릭터 쪽을 지시하고 모달 알림
                    openModal(movie);
                }
            }
        }

        // --- 9. UI 제어 함수 ---
        function openModal(movie) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-quote').innerText = `💬 "${movie.quote}"`;
            document.getElementById('modal-desc').innerText = `🏛️ [박물관 큐레이터의 단서]: ${movie.desc}`;
            
            // 편견 타파용 구글 첫 화면 즉시 이동 검색 링크 연출 [source: 1]
            document.getElementById('modal-link').href = `https://www.google.com/search?q=영화+${encodeURIComponent(movie.title)}`;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 앱 기동
        window.onload = init;
    </script>
</body>
</html>
